{% extends "base.html" %}
{% block title %}Skeevy - Pets{% endblock %}
{% block content %}
<form method="POST">
  <h3>Add Pet</h3>
  <div class="mb-3">
    <label for="name" class="form-label">Pet's Name</label>
    <input type="text" class="form-control" id="name" name="name" />
  </div>
  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <input
      type="password"
      class="form-control"
      id="password"
      name="password"
    />
  </div>
  <div class="d-grid gap-2 d-md-flex">
    <button type="submit" class="btn btn-primary">Login</button>
    <button class="btn btn-outline-primary">Forgot Password</button>
  </div>
</form>
{% endblock %}
